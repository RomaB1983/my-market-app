spring.application.name=shop-service
server.port=8080

spring.r2dbc.url=r2dbc:h2:mem:///mymarketdb
spring.r2dbc.username=sa
spring.r2dbc.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

spring.redis.host: localhost
spring.redis.port: 6379

spring.session.store-type=redis
spring.session.timeout=30m
#spring.session.redis.namespace=shop:session
#spring.session.redis.flush-mode=on-save


spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

#app.image.dir=C:/temp/images/
app.payment.service.url=http://localhost:8081

spring.r2dbc.properties.logging.level.org.springframework.r2dbc=DEBUG
spring.r2dbc.properties.hibernate.format_sql=true

logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.io.r2dbc=DEBUG
logging.level.reactor.netty=DEBUG
logging.level.org.springframework.session=DEBUG
logging.level.org.springframework.session.web.server=DEBUG
logging.level.org.springframework.session.ReactiveSessionRepository=DEBUG
logging.level.org.springframework.web.server.session=DEBUG
logging.level.org.springframework.web.reactive.result.method.annotation=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.springframework.data.redis=DEBUG
