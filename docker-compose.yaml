version: '3.8'

services:
  redis:
    image: redis:7.4.2-bookworm
    container_name: shop-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  payment-service:
    build:
      context: ./payment-service
      dockerfile: Dockerfile
    container_name: payment-service
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      - redis
    restart: unless-stopped

  shop-service:
    build:
      context: ./shop-service
      dockerfile: Dockerfile
    container_name: shop-service
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - APP_PAYMENT_SERVICE_URL=http://payment-service:8081
#      - APP_PAYMENT_SERVICE_URL=http://localhost:8081
    depends_on:
      - redis
      - payment-service
    restart: unless-stopped
